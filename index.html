<!DOCTYPE html>
<html>
<head>
    <title>5 Square Loader</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .box {
            width: 35px;
            height: 35px;
            background: #ddd;
            animation: rainbowWave 1.5s infinite ease-in-out;
            border-radius: 6px;
        }

        .box:nth-child(1) { animation-delay: 0s; }
        .box:nth-child(2) { animation-delay: 0.2s; }
        .box:nth-child(3) { animation-delay: 0.4s; }
        .box:nth-child(4) { animation-delay: 0.6s; }
        .box:nth-child(5) { animation-delay: 0.8s; }

        @keyframes rainbowWave {
            0% {
                background: #ddd;
                transform: scale(1);
            }
            25% {
                background: #ff4d4d;
                transform: scale(1.2);
            }
            50% {
                background: #ffd633;
                transform: scale(1.3);
            }
            75% {
                background: #00ccff;
                transform: scale(1.2);
            }
            100% {
                background: #ddd;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

<div class="row">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
</div>

</body>
</html>
